<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLM Nexus - Conduit-Nexus Observability Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              conduit: {
                navy: '#0A1628',
                teal: '#00B4D8',
                bg: '#F0F4F8',
                slate: '#1E293B',
                success: '#22C55E',
                amber: '#F59E0B',
                red: '#EF4444',
                muted: '#8B9BB4',
                border: '#E2E8F0',
              }
            }
          }
        }
      }
    </script>
    <style>
        :root {
            --navy: #0A1628;
            --teal: #00B4D8;
            --bg: #F0F4F8;
            --muted: #8B9BB4;
            --border: #E2E8F0;
        }
        body {
            background-color: var(--bg);
            color: var(--navy);
            transition: background-color 0.4s ease, color 0.4s ease;
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
        }
        .grain-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.015;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        .interactive-3d {
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
            transform-style: preserve-3d;
            perspective: 1000px;
        }
        .interactive-3d:hover {
            transform: translateY(-8px) rotateX(4deg) rotateY(4deg);
            box-shadow: var(--card-shadow);
        }
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent-primary); border-radius: 10px; }
        
        /* Indian-centric UI fixes */
        .rupee-symbol::before { content: "₹"; margin-right: 2px; }
    </style>
    <script type="importmap">
{
  "imports": {

    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "d3": "https://esm.sh/d3@^7.9.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="antialiased font-sans selection:bg-nexus-accent selection:text-white">
    <div class="grain-overlay"></div>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
